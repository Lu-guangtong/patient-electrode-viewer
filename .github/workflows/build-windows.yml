name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          if ($version.StartsWith("v")) { $version = $version.Substring(1) }
          if (-not $version) { $version = "0.1.0-dev" }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests
        shell: pwsh
        run: python -m unittest discover -s tests -v

      - name: Build app with PyInstaller
        shell: pwsh
        run: pyinstaller packaging\patient_electrode_viewer.spec --noconfirm

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: iscc packaging\installer.iss

      - name: Create portable zip
        shell: pwsh
        run: Compress-Archive -Path dist\PatientElectrodeViewer\* -DestinationPath "dist\PatientElectrodeViewer-portable-$env:APP_VERSION.zip" -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/installer/*.exe
            dist/*.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/installer/*.exe
            dist/*.zip
